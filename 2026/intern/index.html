<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>115學年度實習故事心得競賽 - 闖關大挑戰</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial Rounded MT Bold', "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Noto Sans CJK TC", sans-serif;
        }

        /* 加入 height: 100% 幫助解決 Google Sites iframe 嵌入問題 */
        html, body {
            height: 100%;
        }

        body {
            background-color: #FFE5E5; 
            background-image: radial-gradient(#111827 1px, transparent 1px);
            background-size: 20px 20px;
            /* 使用 dvh (Dynamic Viewport Height) 以適應 FB App 的上下工具列 */
            min-height: 100vh;
            min-height: 100dvh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem; 
            color: #111827;
            overflow-x: hidden; 
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: #FFFFFF;
            border: 4px solid #111827;
            border-radius: 20px;
            padding: 2rem 1.5rem;
            box-shadow: 6px 6px 0px #111827; /* 稍微縮小陰影節省空間 */
            text-align: center;
            position: relative;
            height: auto; 
            margin: auto; 
        }

        .level-progress {
            display: inline-block;
            color: #111827;
            padding: 6px 18px;
            border: 3px solid #111827;
            border-radius: 999px;
            font-weight: 900;
            font-size: 1.05rem;
            margin-bottom: 1.2rem;
            box-shadow: 3px 3px 0px #111827;
        }

        header h1 {
            font-size: 1.8rem;
            color: #111827;
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        header p {
            font-size: 1.1rem;
            color: #4B5563;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .card {
            background: #FFFFFF;
            border: 3px solid #111827;
            border-radius: 16px;
            padding: 1.2rem 0.75rem;
            cursor: pointer;
            transition: all 0.15s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80px; 
            box-shadow: 4px 4px 0px #111827;
            position: relative;
            touch-action: manipulation;
            -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; 
        }

        .card:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111827;
            background: #F3F4F6;
        }

        .card:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .card .text {
            font-size: 1.15rem;
            font-weight: 900;
            color: #111827;
            line-height: 1.4;
            z-index: 1;
        }

        .card.matched {
            background: #86EFAC;
            border-color: #111827;
            cursor: default;
            pointer-events: none;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }

        .card.error {
            background: #FCA5A5;
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(17, 24, 39, 0.8);
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 1000;
        }

        .modal-content {
            background: #E0E7FF;
            border: 4px solid #111827;
            padding: 2rem 1.5rem;
            border-radius: 20px;
            max-width: 450px;
            width: 100%;
            /* 針對手機版加入高度限制，更嚴格的 80vh 防止 FB 底部條遮擋 */
            max-height: 85vh; 
            overflow-y: auto; 
            text-align: center;
            box-shadow: 8px 8px 0px #111827;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-track {
            background: transparent; 
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: #111827; 
            border-radius: 10px;
        }

        @keyframes popIn {
            0% { transform: scale(0.8) rotate(-2deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .modal h2 {
            color: #111827;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 900;
            text-shadow: 2px 2px 0px #A5B4FC;
        }

        .modal p {
            font-size: 1.05rem;
            line-height: 1.5;
            color: #111827;
            margin-bottom: 1.5rem;
            text-align: left;
            background: #FFFFFF;
            padding: 1.2rem;
            border-radius: 12px;
            border: 3px solid #111827;
            font-weight: bold;
        }

        .btn {
            background: #38BDF8;
            color: #111827;
            border: 3px solid #111827;
            padding: 1rem 1.8rem;
            font-size: 1.15rem;
            font-weight: 900;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #111827;
            transition: all 0.15s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111827;
            background: #7DD3FC;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #111827;
        }
        
        .hidden {
            display: none !important;
        }

        /* 💡 新增：小按鈕樣式 (用於複製分享) */
        .btn-small {
            background: #E5E7EB; /* 淺灰色 */
            color: #111827;
            border: 2px solid #111827;
            padding: 0.5rem 0.8rem;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 2px 2px 0px #111827;
            transition: all 0.15s ease;
            margin-right: 0.5rem;
        }

        .btn-small:hover {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #111827;
            background: #D1D5DB;
        }

        .btn-small:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #111827;
        }

        /* 🎵 新增：音效開關按鈕樣式 */
        .sound-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #FFFFFF;
            border: 3px solid #111827;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 3px 3px 0px #111827;
            z-index: 2000;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .sound-toggle:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #111827;
        }

        /* 💡 針對手機 (Facebook App / Google Sites 嵌入) 進行終極排版壓縮 */
        @media (max-width: 480px) {
            body { 
                padding: 0.5rem; /* 幾乎不留外部白邊 */
            }
            .container { 
                padding: 1.25rem 1rem; /* 壓縮內部白邊 */
                margin-top: 0; 
                margin-bottom: 0;
                border-width: 3px; 
                border-radius: 16px;
            }
            .game-board {
                grid-template-columns: 1fr;
                gap: 0.65rem; /* 大幅縮小卡片間距 */
            }
            header h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
            header p { font-size: 1rem; margin-bottom: 1rem; }
            .level-progress { margin-bottom: 1rem; font-size: 1rem; padding: 4px 14px; }
            
            .card {
                padding: 0.85rem; /* 壓縮卡片內距 */
                min-height: auto; /* 讓內容自動撐高，不強制預留空間 */
            }
            .card .text { font-size: 1.1rem; }
            
            /* Modal 壓縮，確保按鈕能顯示 */
            .modal-content {
                padding: 1.5rem 1.25rem;
                max-height: 80vh; 
            }
            .modal h2 { font-size: 1.6rem; }
            .modal p { font-size: 1rem; padding: 1rem; margin-bottom: 1rem; }
            .btn { padding: 0.85rem 1.2rem; font-size: 1.1rem; }
        }

        /* 💡 針對特別矮的手機螢幕(或橫向)做額外防護 */
        @media (max-height: 650px) {
            header p { margin-bottom: 0.5rem; }
            .card { padding: 0.6rem; }
            .game-board { gap: 0.5rem; }
            .level-progress { margin-bottom: 0.5rem; }
        }

    </style>
</head>
<body>

    <!-- 修改：音效開關預設顯示為靜音 (🔇) -->
    <button id="sound-toggle" class="sound-toggle" onclick="toggleSound()">🔇</button>

    <!-- 遊戲封面首頁 -->
    <div class="container" id="cover-page">
        <header>
            <div class="level-progress" style="background: #FCA5A5; transform: rotate(3deg);">📸 GUIDE BOOK</div>
            <h1 style="font-size: 2.2rem; margin-top: 0.5rem; line-height: 1.3;">實習回憶微光<br>終極參賽攻略</h1>
            <p style="margin-top: 0.5rem; font-size: 1.15rem;">把我的職場日常，變成他的指南大補帖！<br>30秒闖關解鎖專屬獎勵與報名資格 🏆</p>
        </header>
        <button class="btn" onclick="startGame()" style="font-size: 1.4rem; padding: 1rem 2.5rem; margin-top: 0.5rem; background: #FDE047;">開始攻略 🚀</button>
    </div>

    <!-- 遊戲闖關主畫面 -->
    <div class="container hidden" id="game-page">
        <header>
            <div class="level-progress" id="level-progress" style="background: #FDE047; transform: rotate(-2deg);">🚀 LEVEL 1 / 3</div>
            <h1 id="level-title">實習競賽挑戰</h1>
            <p id="level-desc">選出所有正確條件，解鎖下一關！</p>
        </header>

        <div class="game-board" id="board">
            <!-- 卡片動態生成 -->
        </div>
    </div>

    <!-- 🎵 隱藏的音效元件 (使用公開 CDN 免費授權音效) -->
    <audio id="sound-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" preload="auto"></audio>
    <audio id="sound-correct" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>
    <audio id="sound-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>

    <!-- 單關通關彈出視窗 -->
    <div class="modal" id="levelSuccessModal">
        <div class="modal-content" style="background: #D9F99D; max-width: 400px;">
            <h2 style="text-shadow: 2px 2px 0px #BEF264;">🎉 恭喜通關！</h2>
            <p style="text-align: center; border: 2px dashed #111827; background: transparent;">本關所有條件已成功解鎖！<br>快前往下一個關卡吧！</p>
            <button class="btn" onclick="proceedToNextLevel()">下一關 ➡️</button>
        </div>
    </div>

    <!-- 終極通關彈出視窗 -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <h2>🎉 恭喜通關！你已成功打包競賽完全攻略</h2>
            <p>
               ✅ <strong>報名資格</strong><br>清華具正式學籍在校生 (*)<br>
               2025/10月~2026/09/15 期間實習<br>
               同機構實習達60小時 (*)<br>
               <span style="font-size: 0.75rem; font-weight: normal; color: #4B5563;">標示*需參閱詳細規定</span><br><br>
               🎒 <strong>準備裝備</strong><br>1張照片+1篇心得+證明+切結書<br><br>
               🎯 <strong>報名期限</strong><br>07/01-09/15 職發組官網投遞
            </p>
            
            <!-- 雙按鈕並排：改為 flex, horizontal 排列, 互換位置並調整大小 -->
            <div style="display: flex; gap: 0.5rem; justify-content: center; flex-wrap: nowrap; margin-bottom: 0.8rem;">
                <a href="https://ccd.nthu.edu.tw/news/529" target="_blank" class="btn" style="background: #FDE047; padding: 0.8rem 1rem; font-size: 1rem; flex: 1; text-align: center; white-space: nowrap;">詳細報名 🔗</a>
                <button class="btn" onclick="restartGame()" style="padding: 0.8rem 1rem; font-size: 1rem; flex: 1; white-space: nowrap;">再玩一次 🎮</button>
            </div>

            <!-- 新增：複製分享按鈕區塊 (移至最下方) -->
            <div>
                <button class="btn-small" onclick="copyShareLink(this)">🔗 複製分享給其他人</button>
            </div>
        </div>
    </div>

    <script>
        const gameLevels = [
            {
                title: "Q1. 誰有資格報名？",
                desc: "點擊【所有】符合參賽資格的條件！",
                cards: [
                    { text: "🧑‍🎓 清華具正式學籍在校生", correct: true },
                    { text: "🗓️ 去年10月~今年09/15期間實習", correct: true },
                    { text: "⏳ 同機構實習滿 60 小時", correct: true },
                    { text: "🎓 已經畢業三年的清華校友", correct: false }
                ]
            },
            {
                title: "Q2. 報名需要帶什麼？",
                desc: "點擊【所有】必備的徵件裝備！",
                cards: [
                    { text: "📸 1張實習照片 + 1篇心得", correct: true },
                    { text: "📜 實習證明", correct: true },
                    { text: "✍️ 附件2切結書", correct: true },
                    { text: "💸 報名手續費 500 元", correct: false }
                ]
            },
            {
                title: "Q3. 怎麼投遞報名？",
                desc: "點擊【所有】正確的投稿資訊！",
                cards: [
                    { text: "🌐 職涯發展組官網投遞", correct: true },
                    { text: "⏰ 2026/07/01 起開放投稿", correct: true },
                    { text: "🇹🇼中文或🇺🇸英文擇一即可", correct: true },
                    { text: "🤯 必須同時繳交雙語版本", correct: false }
                ]
            }
        ];

        let currentLevelIndex = 0;
        let correctFoundInLevel = 0;
        let targetCorrectInLevel = 0;
        let isSoundEnabled = false; // 修改：音效預設改為關閉 (false)

        // 🎵 新增：切換音效開關邏輯
        function toggleSound() {
            isSoundEnabled = !isSoundEnabled;
            const toggleBtn = document.getElementById('sound-toggle');
            if (isSoundEnabled) {
                toggleBtn.innerText = '🔊';
                playSound('sound-click'); 
            } else {
                toggleBtn.innerText = '🔇';
            }
        }

        // 🎵 音效播放共用函數
        function playSound(soundId) {
            if (!isSoundEnabled) return; // 如果靜音模式開啟，則直接返回不播放
            const sound = document.getElementById(soundId);
            if (sound) {
                sound.currentTime = 0; // 每次播放前重置時間，允許快速連點重疊播放
                sound.play().catch(error => console.log("音效播放被瀏覽器阻擋:", error));
            }
        }

        function startGame() {
            playSound('sound-click');
            document.getElementById('cover-page').classList.add('hidden');
            document.getElementById('game-page').classList.remove('hidden');
            loadLevel(0);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function loadLevel(index) {
            const board = document.getElementById('board');
            const levelTitle = document.getElementById('level-title');
            const levelDesc = document.getElementById('level-desc');
            const levelProgress = document.getElementById('level-progress');
            
            board.innerHTML = ''; 
            correctFoundInLevel = 0;
            
            const levelData = gameLevels[index];
            levelTitle.innerText = levelData.title;
            levelDesc.innerText = levelData.desc;
            levelProgress.innerText = `🚀 LEVEL ${index + 1} / ${gameLevels.length}`;

            targetCorrectInLevel = levelData.cards.filter(c => c.correct).length;
            const shuffledCards = shuffle([...levelData.cards]);
            
            shuffledCards.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.innerHTML = `<div class="text">${data.text}</div>`;
                card.addEventListener('click', () => handleCardClick(card, data.correct));
                board.appendChild(card);
            });
        }

        function handleCardClick(card, isCorrect) {
            if (card.classList.contains('matched') || card.classList.contains('error')) return;

            if (isCorrect) {
                playSound('sound-correct');
                card.classList.add('matched');
                card.innerHTML += `<div style="margin-top:6px; font-size: 0.95rem; color: #111827; font-weight: 900;">✅ BINGO</div>`;
                correctFoundInLevel++;

                if (correctFoundInLevel === targetCorrectInLevel) {
                    setTimeout(() => showLevelComplete(), 400); 
                }
            } else {
                playSound('sound-error');
                card.classList.add('error');
                card.innerHTML += `<div class="error-text" style="margin-top:6px; font-size: 0.95rem; color: #7F1D1D; font-weight: 900;">❌ 答錯啦</div>`;
                
                setTimeout(() => {
                    card.classList.remove('error');
                    const errorText = card.querySelector('.error-text');
                    if(errorText) card.removeChild(errorText);
                }, 500);
            }
        }

        function showLevelComplete() {
            playSound('sound-win');
            if (currentLevelIndex < gameLevels.length - 1) {
                document.getElementById('levelSuccessModal').style.display = 'flex';
            } else {
                document.getElementById('successModal').style.display = 'flex';
            }
        }

        function proceedToNextLevel() {
            playSound('sound-click');
            document.getElementById('levelSuccessModal').style.display = 'none';
            currentLevelIndex++;
            loadLevel(currentLevelIndex);
        }

        // 新增：不重新整理網頁，直接用 JS 重置遊戲狀態的函數
        function restartGame() {
            playSound('sound-click');
            // 1. 隱藏最後的通關視窗
            document.getElementById('successModal').style.display = 'none';
            // 2. 隱藏遊戲主畫面
            document.getElementById('game-page').classList.add('hidden');
            // 3. 顯示最初的封面頁
            document.getElementById('cover-page').classList.remove('hidden');
            // 4. 重置關卡進度
            currentLevelIndex = 0;
            
            // 5. 重置複製按鈕文字 (如果有按過的話)
            const copyBtn = document.querySelector('.btn-small');
            if(copyBtn) copyBtn.innerText = '🔗 複製分享給其他人';
        }

        // 新增：複製分享連結功能
        function copyShareLink(btnElement) {
            const shareUrl = "https://carerer02.github.io/career/2026/intern/";
            
            // 建立一個臨時的隱藏 input 來執行複製動作 (相容性較佳的作法)
            const tempInput = document.createElement("input");
            tempInput.value = shareUrl;
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try {
                // 執行複製指令
                document.execCommand("copy");
                // 改變按鈕文字給予視覺回饋
                const originalText = btnElement.innerText;
                btnElement.innerText = "✅ 已複製網址！";
                btnElement.style.background = "#D9F99D"; // 變成淺綠色
                
                // 2秒後恢復原狀
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.background = "#E5E7EB";
                }, 2000);
            } catch (err) {
                console.error("複製失敗:", err);
            } finally {
                // 移除臨時 input
                document.body.removeChild(tempInput);
            }
        }
    </script>
</body>
</html>
